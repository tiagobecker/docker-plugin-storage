name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test

      - name: Build binaries
        run: make build

  plugin-rootfs:
    name: Docker plugin rootfs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin rootfs image
        run: docker build -f packaging/Dockerfile.plugin-rootfs -t dps-plugin-rootfs:ci .
